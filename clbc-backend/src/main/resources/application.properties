spring.application.name=clbc-backend

# Primary DataSource (clbc_main)
spring.datasource.url=jdbc:mysql://localhost:3306/clbc_main?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=cladmin
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# Audit DataSource (clbc_audit)
audit.datasource.url=jdbc:mysql://localhost:3306/clbc_audit?createDatabaseIfNotExist=true&serverTimezone=UTC
audit.datasource.username=cladmin
audit.datasource.password=${DB_PASSWORD}
audit.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Enable SpringDoc
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# JWT Configuration
# Valid Base64 256-bit key
clbc.jwt.secret=${JWT_SECRET}
clbc.jwt.expiration=3600000
clbc.jwt.refreshExpiration=86400000

# File Upload Configuration
clbc.upload.dir=./uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
